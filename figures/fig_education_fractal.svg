<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Hiragino Sans, sans-serif">
  <defs>
    <marker id="ah2" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#23373b"/>
    </marker>
  </defs>
  <text x="500" y="46" font-size="24" fill="#23373b" font-weight="bold" text-anchor="middle">同じループがコードにも教育にも回る</text>
  <!-- code loop (top) -->
  <text x="120" y="130" font-size="22" fill="#eb811b" font-weight="bold">コード</text>
  <g font-size="18" fill="#23373b" text-anchor="middle">
    <rect x="120" y="150" width="170" height="58" rx="9" fill="#fdf1e3" stroke="#eb811b" stroke-width="2"/>
    <text x="205" y="185">研究で試す</text>
    <rect x="345" y="150" width="170" height="58" rx="9" fill="#fdf1e3" stroke="#eb811b" stroke-width="2"/>
    <text x="430" y="185">失敗する</text>
    <rect x="570" y="150" width="190" height="58" rx="9" fill="#fdf1e3" stroke="#eb811b" stroke-width="2"/>
    <text x="665" y="178">一般化して</text>
    <text x="665" y="200" font-size="15">rules/oracle に</text>
  </g>
  <g fill="none" stroke="#23373b" stroke-width="2.5" marker-end="url(#ah2)">
    <path d="M290,179 L343,179"/>
    <path d="M515,179 L568,179"/>
    <path d="M760,208 Q820,260 760,300 L210,300 Q140,260 200,210" />
  </g>
  <text x="820" y="258" font-size="14" fill="#888">正本</text>
  <!-- divider -->
  <line x1="80" y1="340" x2="920" y2="340" stroke="#ddd" stroke-width="2" stroke-dasharray="8 6"/>
  <!-- education loop (bottom) -->
  <text x="120" y="392" font-size="22" fill="#eb811b" font-weight="bold">教育パイプライン</text>
  <g font-size="18" fill="#23373b" text-anchor="middle">
    <rect x="120" y="410" width="200" height="58" rx="9" fill="#f0f4f5" stroke="#23373b" stroke-width="2"/>
    <text x="220" y="438">研究レベルで試す</text>
    <rect x="375" y="410" width="170" height="58" rx="9" fill="#f0f4f5" stroke="#23373b" stroke-width="2"/>
    <text x="460" y="438">失敗から学ぶ</text>
    <rect x="600" y="410" width="200" height="58" rx="9" fill="#f0f4f5" stroke="#23373b" stroke-width="2"/>
    <text x="700" y="438" font-size="16">教育に落とす</text>
  </g>
  <g fill="none" stroke="#23373b" stroke-width="2.5" marker-end="url(#ah2)">
    <path d="M320,439 L373,439"/>
    <path d="M545,439 L598,439"/>
  </g>
  <text x="500" y="525" font-size="18" fill="#cc0000" text-anchor="middle">正本も教育も, 最初から完成形は存在しない</text>
</svg>
